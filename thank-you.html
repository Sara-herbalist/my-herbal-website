<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank you — Sara Lemaitre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root { --cream:#F7F3EE;--warm-white:#FDFAF7;--sage:#7A8C6E;--sage-light:#C4D0BA;--bark:#5C4A3A;--muted:#7A6E68; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--warm-white);color:var(--bark);font-family:'Jost',sans-serif;font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
  .wrap{max-width:520px;}
  .icon{width:60px;height:60px;border-radius:50%;background:var(--sage-light);display:flex;align-items:center;justify-content:center;margin:0 auto 2rem;}
  .icon svg{width:28px;height:28px;stroke:var(--bark);stroke-width:1.5;fill:none;}
  h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3rem);font-weight:300;line-height:1.15;margin-bottom:1rem;}
  h1 em{font-style:italic;color:var(--sage-text);}
  p{font-size:.97rem;color:var(--muted);line-height:1.9;margin-bottom:2rem;}
  a{display:inline-block;padding:.85rem 2.2rem;border:1px solid var(--bark);color:var(--bark);text-decoration:none;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;transition:all .22s;}
  a:hover{background:var(--bark);color:var(--warm-white);}

  /* ── WCAG 2.2 AA: Visible focus indicators ── */
  :focus-visible {
    outline: 3px solid #5C4A3A;
    outline-offset: 3px;
    border-radius: 2px;
  }
  a:focus-visible, button:focus-visible, input:focus-visible,
  select:focus-visible, textarea:focus-visible {
    outline: 3px solid #5C4A3A;
    outline-offset: 3px;
  }

  /* Screen-reader only utility */
  .sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }

  /* ── Skip navigation link ── */
  .skip-nav {
    position: absolute; top: -100px; left: 1rem; z-index: 9999;
    background: #5C4A3A; color: #F7F3EE;
    padding: .75rem 1.5rem; font-size: 1.0625rem;
    text-decoration: none; border-radius: 0 0 4px 4px;
    transition: top .2s;
  }
  .skip-nav:focus { top: 0; }


  /* Language toggle */
  .lang-toggle {
    font-size: .75rem; letter-spacing: .16em; text-transform: uppercase;
    padding: .45rem .9rem; border: 1px solid rgba(92,74,58,.35);
    background: none; color: var(--muted); cursor: pointer;
    font-family: 'Jost', sans-serif; border-radius: 2px;
    transition: all .2s; margin-left: .5rem;
  }
  .lang-toggle:hover { border-color: var(--bark); color: var(--bark); }
  [data-lang="fr"] .lang-toggle { border-color: var(--bark); color: var(--bark); }

</style>
</head>
<body>
<a href="#main-content" class="skip-nav">Skip to main content</a>
<div class="wrap">
  <div class="icon">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h1>Message <em>received</em></h1>
  <p>Thank you for getting in touch. I will be back with you within two working days.<br>In the meantime, feel free to explore the rest of the practice.</p>
  <a href="index.html" data-i18n="thankyou.back">Back to home</a>
</div>
<script src="translations.js"></script>
<script src="i18n.js"></script>
</body>
</html>
